<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Dealer Systems | Live Dashboard</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* Force the Inter Tight font onto EVERY element, absolutely no exceptions */
        * {
            font-family: 'Inter Tight', sans-serif !important;
        }

        /* Base document properties */
        body {
            margin: 0; padding: 20px 0; background-color: #000000;
            color: #FFFFFF; min-height: 100vh; display: flex; 
            flex-direction: column; align-items: center; overflow-x: hidden;
        }
        
        .header, .hero-counter, .table-container, .chart-footer {
            width: 95vw; max-width: 1400px;
        }

        .header { text-align: center; margin-bottom: 25px; margin-top: 10px; }
        
        .header h1 { 
            margin: 0; font-size: 2.5rem; font-weight: 600; letter-spacing: -0.5px;
            background: linear-gradient(120deg, #8E8E93, #FFFFFF, #8E8E93, #FFFFFF);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmerFlow 8s ease infinite;
            filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.2)); 
        }
        .header p { margin: 5px 0 0 0; color: #8E8E93; font-size: 1.1rem; }

        @keyframes shimmerFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .hero-counter { text-align: center; margin-bottom: 30px; }
        .hero-counter h2 {
            font-size: 2.5rem; color: #FFFFFF; margin: 0;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }
        .hero-counter .highlight {
            color: #57bb8a; 
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 20px rgba(87, 187, 138, 0.7), 0 0 40px rgba(87, 187, 138, 0.3); 
        }

        .table-container {
            overflow-x: auto;
            border: 1px solid #1C1C1E;
            border-radius: 8px;
            background-color: #000000;
            margin-bottom: 30px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.04); 
            max-height: 65vh; 
        }
        
        table {
            width: 100%; border-collapse: collapse; text-align: center;
            font-size: 0.95rem; white-space: nowrap; font-variant-numeric: tabular-nums;
        }
        
        th, td {
            padding: 13px 15px; border-bottom: 1px solid #1C1C1E; border-right: 1px solid #1C1C1E;
            vertical-align: middle !important; text-align: center !important;
        }
        
        th {
            border-bottom: 2px solid #FFFFFF; border-right: 1px solid #2C2C2E;
            color: #FFFFFF; font-weight: 700; background-color: #000000;
            position: sticky; top: 0; z-index: 10;
        }

        th:last-child, td:last-child { border-right: none; }
        
        td:first-child { font-weight: 700; } 
        td:nth-child(2) { font-weight: 700; color: #FFFFFF; } 
        td { color: #8E8E93; } 
        
        /* Make rows clickable to route to the Deal Desk */
        tbody tr { cursor: pointer; transition: background-color 0.2s ease; }
        tbody tr:hover { background-color: #161618; }

        /* Status Pills */
        .status-new { 
            background-color: rgba(87, 187, 138, 0.1) !important; 
            color: #57bb8a !important; 
            font-weight: 600; padding: 4px 12px; border-radius: 100px;
            border: 1px solid rgba(87, 187, 138, 0.3);
            box-shadow: 0 0 15px rgba(87, 187, 138, 0.2); 
        }

        /* Glowing Orange Stale Status */
        .status-stale { 
            background-color: rgba(249, 115, 22, 0.1) !important; 
            color: #f97316 !important; 
            font-weight: 600; padding: 4px 12px; border-radius: 100px;
            border: 1px solid rgba(249, 115, 22, 0.3);
            box-shadow: 0 0 15px rgba(249, 115, 22, 0.2); 
        }

        /* Import Button */
        .import-btn {
            display: inline-block; margin-bottom: 40px; padding: 14px 28px;
            background-color: #1C1C1E; color: #8E8E93; border-radius: 100px;
            text-decoration: none; font-size: 1.05rem; font-weight: 600;
            transition: all 0.3s ease; border: 1px solid transparent; cursor: pointer;
        }
        .import-btn:hover { 
            color: #FFFFFF; background-color: #2C2C2E; 
            transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255, 255, 255, 0.15); 
        }

        .chart-footer {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: auto; font-size: 0.85rem; color: #8E8E93; font-weight: 400; padding-bottom: 10px;
        }
        .chart-footer > div { flex: 1; }
        .chart-footer > div:nth-child(2) { text-align: center; } /* Forces absolute center */
        .chart-footer > div:last-child { text-align: right; color: #FFFFFF; font-weight: 600; }
        
        #live-clock { text-align: left; color: #FFFFFF; font-weight: 600; font-variant-numeric: tabular-nums; }
        
        #system-status { 
            color: #57bb8a; font-weight: 600; display: inline-block;
            animation: statusBreathe 3s ease-in-out infinite;
        }

        @keyframes statusBreathe {
            0% { transform: scale(1); opacity: 0.8; text-shadow: 0 0 8px rgba(87, 187, 138, 0.4); }
            50% { transform: scale(1.03); opacity: 1; text-shadow: 0 0 18px rgba(87, 187, 138, 0.9), 0 0 30px rgba(87, 187, 138, 0.4); }
            100% { transform: scale(1); opacity: 0.8; text-shadow: 0 0 8px rgba(87, 187, 138, 0.4); }
        }

        .table-container::-webkit-scrollbar { height: 8px; width: 8px; }
        .table-container::-webkit-scrollbar-track { background: #000000; }
        .table-container::-webkit-scrollbar-thumb { background: #2C2C2E; border-radius: 4px; }
        .table-container::-webkit-scrollbar-thumb:hover { background: #3A3A3C; }

        @media (max-width: 800px) {
            .chart-footer { flex-direction: column; gap: 8px; }
            .chart-footer > div { text-align: center !important; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Apex Dealer Systems</h1>
        <p>Active Leads Dashboard (Click a lead to open Deal Desk)</p>
    </div>

    <div class="hero-counter">
        <h2>Leads Saved: <span class="highlight" id="leadCounter">10,000</span></h2>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Customer Name</th>
                    <th>Phone</th>
                    <th>Vehicle Interest</th>
                    <th>Assigned To</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <button class="import-btn">Import Leads from your past CRM</button>

    <div class="chart-footer">
        <div id="live-clock">Time: --:--:-- -- Central Time</div>
        <div><span id="system-status">System Status: Online</span></div>
        <div>Note: All times are in (CT - Central Time Zone).</div>
    </div>

    <script>
        // Fast Counter
        let currentCount = 10000;
        setInterval(() => {
            currentCount += 1;
            document.getElementById('leadCounter').innerText = currentCount.toLocaleString();
        }, 40);

        const sampleNames = [
            "Josh Stevenson", "Noah Albright", "Oliver Sterling", "Elijah Crawford", "William Hayes", 
            "James Easton", "Benjamin Mercer", "Lucas Thorne", "Henry Blackwell", "Alexander Cross",
            "Mia Davenport", "Ethan Gallagher", "David Vance", "Michael Knight", "Robert Chase", 
            "Emma Stone", "Sophia Laurent", "Olivia Wilde", "Isabella Ross", "Ava Montgomery", 
            "Mason Creed", "Logan Pierce", "Jacob Stryker", "Jack Dalton", "Sarah Miller"
        ];
        
        const sampleVehicles = [
            "2024 Ducati Panigale V4", "Kawasaki Ninja 400", "Yamaha MT-07", "Suzuki GSX-R750", 
            "Honda CBR600RR", "BMW S1000RR", "2024 Yamaha R1", "Kawasaki Z900", "KTM 390 Duke"
        ];

        const sampleReps = ["Umair", "Paul", "Steven", "Blake", "Mike"];

        const leadsDatabase = [];

        for (let i = 1; i <= 25; i++) {
            const name = sampleNames[i - 1];
            const phone = `555-01${String(20 + i)}`;
            const vehicle = sampleVehicles[(i * 3) % sampleVehicles.length];
            const rep = sampleReps[(i * 7) % sampleReps.length];
            
            // Exactly alternate between New and Stale to guarantee Stale shows up vividly
            const status = (i % 3 === 0) ? "Stale" : "New"; 

            leadsDatabase.push({ id: i, name, phone, vehicle, rep, status });
        }

        // Render Table
        function loadData() {
            const tbody = document.getElementById('table-body');
            leadsDatabase.forEach(lead => {
                let tr = document.createElement('tr');
                
                // Routes to the Deal Desk when a row is clicked
                tr.onclick = function() { window.location.href = 'deal-desk.html'; };

                const statusClass = lead.status === "New" ? "status-new" : "status-stale";
                
                tr.innerHTML = `
                    <td>${lead.id}</td>
                    <td>${lead.name}</td>
                    <td>${lead.phone}</td>
                    <td>${lead.vehicle}</td>
                    <td style="color: #ffffff;">${lead.rep}</td>
                    <td><span class="${statusClass}">${lead.status}</span></td>
                `;
                tbody.appendChild(tr);
            });
        }
        loadData();

        // Live Clock
        function updateClock() {
            const now = new Date();
            const timeOptions = { timeZone: 'America/Chicago', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
            document.getElementById('live-clock').innerText = `Time: ${now.toLocaleTimeString('en-US', timeOptions)} Central Time`;
        }
        setInterval(updateClock, 1000);
        updateClock(); 
    </script>
</body>
</html>
