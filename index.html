<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Dealer Systems | Live Dashboard</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        * { font-family: 'Inter Tight', sans-serif !important; box-sizing: border-box; }

        body {
            margin: 0; padding: 20px 0; background-color: #09090B;
            color: #FFFFFF; min-height: 100vh; display: flex; 
            flex-direction: column; align-items: center; overflow-x: hidden;
        }
        
        .header, .hero-counter, .table-container, .action-container, footer {
            width: 95vw; max-width: 1400px;
        }

        .header { text-align: center; margin-bottom: 25px; margin-top: 10px; }
        
        .header h1 { 
            margin: 0; font-size: 2.5rem; font-weight: 800; letter-spacing: -0.5px;
            color: #ffffff;
        }
        .header h1 span { color: #dc2626; font-weight: 800; }
        .header p { margin: 5px 0 0 0; color: #a1a1aa; font-size: 1rem; }

        .hero-counter { text-align: center; margin-bottom: 30px; }
        .hero-counter h2 {
            font-size: 2.2rem; color: #FFFFFF; margin: 0; font-weight: 700;
        }
        .hero-counter .highlight {
            color: #10b981; 
            font-variant-numeric: tabular-nums;
        }

        .table-container {
            overflow-x: auto;
            border: 1px solid #27272a;
            border-radius: 8px;
            background-color: #18181b;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); 
            max-height: 60vh; 
        }
        
        table {
            width: 100%; border-collapse: collapse; text-align: left;
            font-size: 0.95rem; white-space: nowrap; font-variant-numeric: tabular-nums;
        }
        
        th, td {
            padding: 14px 20px; border-bottom: 1px solid #27272a; 
            vertical-align: middle !important;
        }
        
        th {
            border-bottom: 1px solid #3f3f46; 
            color: #a1a1aa; font-weight: 600; background-color: #09090b;
            position: sticky; top: 0; z-index: 10; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em;
        }

        td:first-child { font-weight: 600; color: #d4d4d8; } 
        td:nth-child(2) { font-weight: 600; color: #FFFFFF; } 
        td { color: #a1a1aa; } 
        
        tbody tr { cursor: pointer; transition: background-color 0.15s ease; }
        tbody tr:hover { background-color: #27272a; }

        .status-new { 
            background-color: rgba(16, 185, 129, 0.1) !important; 
            color: #10b981 !important; 
            font-weight: 700; font-size: 0.75rem; padding: 4px 12px; border-radius: 100px;
            border: 1px solid rgba(16, 185, 129, 0.3);
            text-transform: uppercase; letter-spacing: 0.05em;
        }

        .status-stale { 
            background-color: rgba(249, 115, 22, 0.1) !important; 
            color: #f97316 !important; 
            font-weight: 700; font-size: 0.75rem; padding: 4px 12px; border-radius: 100px;
            border: 1px solid rgba(249, 115, 22, 0.3);
            text-transform: uppercase; letter-spacing: 0.05em;
        }

        .action-container { text-align: center; margin-bottom: 30px; }

        .import-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            margin-bottom: 10px; padding: 14px 32px;
            background-color: #ffffff; color: #000000; border-radius: 100px;
            text-decoration: none; font-size: 0.9rem; font-weight: 700;
            transition: all 0.2s ease; border: none; cursor: pointer;
            text-transform: uppercase; letter-spacing: 0.05em;
        }
        .import-btn:hover { 
            background-color: #e4e4e7; transform: translateY(-2px); 
        }

        .pricing-text {
            color: #60a5fa; 
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 40px;
            letter-spacing: 0.02em;
        }

        footer {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: auto; padding-bottom: 5px; padding-top: 15px;
        }
        
        .footer-pill {
            background-color: rgba(24, 24, 27, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 100px;
            padding: 6px 16px;
            font-size: 12px !important;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .footer-left { color: #71717a; font-variant-numeric: tabular-nums; font-family: monospace, sans-serif; }
        .footer-center { color: #39FF14; font-weight: 700; }
        .footer-right { color: #71717a; }

        #system-status { 
            animation: statusFade 3s ease-in-out infinite;
        }

        @keyframes statusFade {
            0% { opacity: 0.6; text-shadow: 0 0 8px rgba(57, 255, 20, 0.3); }
            50% { opacity: 1; text-shadow: 0 0 15px rgba(57, 255, 20, 0.8), 0 0 25px rgba(57, 255, 20, 0.4); }
            100% { opacity: 0.6; text-shadow: 0 0 8px rgba(57, 255, 20, 0.3); }
        }

        .table-container::-webkit-scrollbar { height: 8px; width: 8px; }
        .table-container::-webkit-scrollbar-track { background: #09090b; }
        .table-container::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        .table-container::-webkit-scrollbar-thumb:hover { background: #52525b; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Apex <span>Dealer Systems</span></h1>
        <p>Active Leads Dashboard &mdash; Click a row to enter Deal Desk</p>
    </div>

    <div class="hero-counter">
        <h2>Leads Saved: <span class="highlight" id="leadCounter">10,000</span></h2>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Customer Name</th>
                    <th>Phone</th>
                    <th>Vehicle Interest</th>
                    <th>Assigned To</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <div class="action-container">
        <button class="import-btn" onclick="window.location.href='importleads.html'">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            Import Leads From Past CRM
        </button>
        <div class="pricing-text">Plans start at $500 a month, for dealers of all sizes.</div>
    </div>

    <footer>
        <div class="footer-pill footer-left" id="live-clock">Time: --:--:--</div>
        <div class="footer-pill footer-center"><span id="system-status">All Systems Online</span></div>
        <div class="footer-pill footer-right">Central Time Zone (CT)</div>
    </footer>

    <script>
        let currentCount = 10000;
        setInterval(() => {
            currentCount += 1;
            document.getElementById('leadCounter').innerText = currentCount.toLocaleString();
        }, 40);

        const sampleNames = [
            "Josh Stevenson", "Noah Albright", "Oliver Sterling", "Elijah Crawford", "William Hayes", 
            "James Easton", "Benjamin Mercer", "Lucas Thorne", "Henry Blackwell", "Alexander Cross",
            "Mia Davenport", "Ethan Gallagher", "David Vance", "Michael Knight", "Robert Chase", 
            "Emma Stone", "Sophia Laurent", "Olivia Wilde", "Isabella Ross", "Ava Montgomery", 
            "Mason Creed", "Logan Pierce", "Jacob Stryker", "Jack Dalton", "Sarah Miller"
        ];
        
        const sampleVehicles = [
            "2024 Ducati Panigale V4", "Kawasaki Ninja 400", "Yamaha MT-07", "Suzuki GSX-R750", 
            "Honda CBR600RR", "BMW S1000RR", "2024 Yamaha R1", "Kawasaki Z900", "KTM 390 Duke"
        ];

        const sampleReps = ["Umair", "Paul", "Steven", "Blake", "Mike"];
        const leadsDatabase = [];

        for (let i = 1; i <= 25; i++) {
            const name = sampleNames[i - 1];
            const phone = `555-01${String(20 + i)}`;
            const vehicle = sampleVehicles[(i * 3) % sampleVehicles.length];
            const rep = sampleReps[(i * 7) % sampleReps.length];
            const status = (i % 3 === 0) ? "Stale" : "New"; 
            leadsDatabase.push({ id: i, name, phone, vehicle, rep, status });
        }

        function loadData() {
            const tbody = document.getElementById('table-body');
            leadsDatabase.forEach(lead => {
                let tr = document.createElement('tr');
                tr.onclick = function() { window.location.href = 'deal-desk.html?id=' + lead.id; };

                const statusClass = lead.status === "New" ? "status-new" : "status-stale";
                
                tr.innerHTML = `
                    <td>${lead.id}</td>
                    <td>${lead.name}</td>
                    <td>${lead.phone}</td>
                    <td>${lead.vehicle}</td>
                    <td style="color: #e5e7eb;">${lead.rep}</td>
                    <td><span class="${statusClass}">${lead.status}</span></td>
                `;
                tbody.appendChild(tr);
            });
        }
        loadData();

        function updateClock() {
            const now = new Date();
            const timeOptions = { timeZone: 'America/Chicago', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
            document.getElementById('live-clock').innerText = `Time: ${now.toLocaleTimeString('en-US', timeOptions)}`;
        }
        setInterval(updateClock, 1000);
        updateClock(); 
    </script>
</body>
</html>
