<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex OS | Secure Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        apex: {
                            bg: '#0A0A0A',
                            panel: '#1A1A1A',
                            primary: '#00FF9F',    /* Electric Teal */
                            secondary: '#FF2E63',  /* Hot Magenta */
                            premium: '#FFD700',    /* Gold */
                            text: '#E0E0E0',
                            muted: '#666666'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Inter Tight', sans-serif !important; box-sizing: border-box; }
        body { background-color: #0A0A0A !important; color: #f1f5f9 !important; margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow-x: hidden; padding: 2rem; }
        body::before { content: ''; position: fixed; inset: 0; z-index: -2; background-image: radial-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px); background-size: 32px 32px; pointer-events: none; }
        .glass-panel { background-color: rgba(26, 26, 26, 0.85) !important; /* #1A1A1A equivalent */ backdrop-filter: blur(50px); border: 1px solid rgba(255, 255, 255, 0.05); border-top: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 40px 80px rgba(0, 0, 0, 0.9); border-radius: 24px; }
        .ambient-glow { position: fixed; top: 50%; left: 50%; width: 100vw; height: 100vw; background: radial-gradient(circle at center, rgba(52, 211, 153, 0.03), transparent 50%); transform: translate(-50%, -50%); z-index: -1; pointer-events: none; }
        .tier-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 0.5rem; }
    </style>
</head>
<body class="relative">
    <div class="ambient-glow"></div>
    <div class="glass-panel p-10 w-full max-w-5xl relative z-10">
        <div class="text-center mb-8">
            <div class="w-16 h-16 mx-auto bg-black border border-white/10 rounded-2xl flex items-center justify-center mb-4 shadow-[0_0_30px_rgba(52,211,153,0.1)]">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </div>
            <h1 class="text-3xl font-black text-white uppercase tracking-widest mb-1">Apex OS</h1>
            <p class="text-xs text-zinc-500 font-bold tracking-widest uppercase">Dealership Access Grid</p>
        </div>

        <form id="login-form" class="max-w-md mx-auto space-y-4">
            <div>
                <label for="email" class="block text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-2">Email</label>
                <input type="email" id="email" name="email" required autocomplete="email"
                    class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-sm text-white placeholder-zinc-600 focus:outline-none focus:border-[#00FF9F]/50 transition">
            </div>
            <div>
                <label for="password" class="block text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-2">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password"
                    class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-sm text-white placeholder-zinc-600 focus:outline-none focus:border-[#00FF9F]/50 transition">
            </div>
            <p id="login-error" class="hidden text-xs font-bold text-rose-400 uppercase tracking-widest text-center"></p>
            <button type="submit"
                class="w-full bg-[#00FF9F] text-black font-black text-xs uppercase tracking-widest py-4 rounded-xl hover:brightness-110 transition disabled:opacity-50 disabled:cursor-not-allowed">
                Sign In
            </button>
        </form>
    </div>
    <script src="apex-core.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const emailInput = document.getElementById('email');
            const errorEl = document.getElementById('login-error');
            const submitBtn = document.querySelector('#login-form button[type="submit"]');
            const email = emailInput.value.trim();
            const payload = { email };

            console.log('[LOGIN] Submit intercepted — sending payload:', payload);

            if (errorEl) {
                errorEl.classList.add('hidden');
                errorEl.textContent = '';
            }
            if (submitBtn) {
                submitBtn.disabled = true;
                submitBtn.textContent = 'AUTHENTICATING...';
            }

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                console.log('[LOGIN] Server response:', { status: response.status, data });

                if (!response.ok) {
                    throw new Error(data.error || 'Authentication failed');
                }

                const role = String(data.role).toUpperCase();
                localStorage.setItem('userEmail', email);
                localStorage.setItem('userRole', role);
                console.log('[LOGIN] Session saved — routing user with role:', role);

                if (role === 'EXECUTIVE' || role === 'ADMINISTRATOR' || role === 'OWNER') {
                    window.location.href = 'owner.html';
                } else if (role === 'MANAGER') {
                    window.location.href = 'manager.html';
                } else if (role === 'STAFF' || role === 'SALESPERSON' || role === 'SALESMAN') {
                    window.location.href = 'index.html';
                } else {
                    throw new Error('Unknown role: ' + role);
                }
            } catch (err) {
                console.error('[LOGIN] Authentication error:', err);
                if (errorEl) {
                    errorEl.textContent = err.message || 'Authentication failed';
                    errorEl.classList.remove('hidden');
                }
                if (submitBtn) {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Sign In';
                }
            }
        });
    </script>
</body>
</html>
