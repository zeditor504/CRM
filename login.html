<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex OS | Secure Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        apex: {
                            bg: '#0A0A0A',
                            panel: '#1A1A1A',
                            primary: '#00FF9F',    /* Electric Teal */
                            secondary: '#FF2E63',  /* Hot Magenta */
                            premium: '#FFD700',    /* Gold */
                            text: '#E0E0E0',
                            muted: '#666666'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Inter Tight', sans-serif !important; box-sizing: border-box; }
        body { background-color: #0A0A0A !important; color: #f1f5f9 !important; margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow-x: hidden; padding: 2rem; }
        body::before { content: ''; position: fixed; inset: 0; z-index: -2; background-image: radial-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px); background-size: 32px 32px; pointer-events: none; }
        .glass-panel { background-color: rgba(26, 26, 26, 0.85) !important; /* #1A1A1A equivalent */ backdrop-filter: blur(50px); border: 1px solid rgba(255, 255, 255, 0.05); border-top: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 40px 80px rgba(0, 0, 0, 0.9); border-radius: 24px; }
        .ambient-glow { position: fixed; top: 50%; left: 50%; width: 100vw; height: 100vw; background: radial-gradient(circle at center, rgba(52, 211, 153, 0.03), transparent 50%); transform: translate(-50%, -50%); z-index: -1; pointer-events: none; }
        .tier-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 0.5rem; }
    </style>
</head>
<body class="relative">
    <div class="ambient-glow"></div>
    <div class="glass-panel p-10 w-full max-w-5xl relative z-10">
        <div class="text-center mb-8">
            <div class="w-16 h-16 mx-auto bg-black border border-white/10 rounded-2xl flex items-center justify-center mb-4 shadow-[0_0_30px_rgba(52,211,153,0.1)]">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </div>
            <h1 class="text-3xl font-black text-white uppercase tracking-widest mb-1">Apex OS</h1>
            <p class="text-xs text-zinc-500 font-bold tracking-widest uppercase">Dealership Access Grid</p>
        </div>

        <div class="space-y-8">
            <div>
                <div class="tier-header">
                    <span class="bg-zinc-800 text-white text-[10px] font-black px-2 py-1 rounded border border-white/10">TIER 1</span>
                    <h2 class="text-xs font-bold text-zinc-400 uppercase tracking-widest">Executive Leadership</h2>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="login('owner.html', 'Executive')" class="p-4 rounded-xl border border-white/5 bg-black/40 hover:bg-white/5 transition text-left flex items-center gap-4 group">
                        <div class="w-10 h-10 rounded-full bg-zinc-800 border border-white/10 flex items-center justify-center group-hover:scale-110 transition shrink-0"><svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path></svg></div>
                        <div><h3 class="text-sm font-bold text-white uppercase tracking-widest">Dealer Principal / Owner</h3><p class="text-[10px] text-zinc-500 font-bold mt-0.5">Executive Command Center</p></div>
                    </button>
                    <button onclick="login('owner.html', 'Executive')" class="p-4 rounded-xl border border-white/5 bg-black/40 hover:bg-white/5 transition text-left flex items-center gap-4 group">
                        <div class="w-10 h-10 rounded-full bg-zinc-800 border border-white/10 flex items-center justify-center group-hover:scale-110 transition shrink-0"><svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg></div>
                        <div><h3 class="text-sm font-bold text-white uppercase tracking-widest">General Manager (GM)</h3><p class="text-[10px] text-zinc-500 font-bold mt-0.5">High-Level Dealership KPIs</p></div>
                    </button>
                </div>
            </div>

            <div>
                <div class="tier-header">
                    <span class="bg-blue-500/20 text-blue-400 border border-blue-500/30 text-[10px] font-black px-2 py-1 rounded">TIER 2</span>
                    <h2 class="text-xs font-bold text-zinc-400 uppercase tracking-widest">Departmental Managers</h2>
                </div>
                <div class="grid grid-cols-3 gap-4">
                    <button onclick="login('manager.html', 'Manager')" class="p-4 rounded-xl border border-white/5 bg-black/40 hover:bg-blue-500/10 hover:border-blue-500/30 transition text-left group">
                        <h3 class="text-xs font-bold text-white uppercase tracking-widest mb-1">Sales Manager</h3><p class="text-[9px] text-zinc-500 font-bold">Team Performance & Overrides</p>
                    </button>
                    <button onclick="login('finance.html', 'Manager')" class="p-4 rounded-xl border border-white/5 bg-black/40 hover:bg-purple-500/10 hover:border-purple-500/30 transition text-left group">
                        <h3 class="text-xs font-bold text-white uppercase tracking-widest mb-1">F&I Manager</h3><p class="text-[9px] text-zinc-500 font-bold">Finance & Protection Plans</p>
                    </button>
                    <button onclick="login('service.html', 'Manager')" class="p-4 rounded-xl border border-white/5 bg-black/40 hover:bg-amber-500/10 hover:border-amber-500/30 transition text-left group">
                        <h3 class="text-xs font-bold text-white uppercase tracking-widest mb-1">Service Manager</h3><p class="text-[9px] text-zinc-500 font-bold">Shop Flow & Tech Efficiency</p>
                    </button>
                    <button onclick="login('parts.html', 'Manager')" class="p-4 rounded-xl border border-white/5 bg-black/40 hover:bg-rose-500/10 hover:border-rose-500/30 transition text-left group">
                        <h3 class="text-xs font-bold text-white uppercase tracking-widest mb-1">Parts Manager</h3><p class="text-[9px] text-zinc-500 font-bold">OEM Stock & Replenishment</p>
                    </button>
                    <button onclick="login('index.html', 'Manager')" class="p-4 rounded-xl border border-white/5 bg-black/40 hover:bg-emerald-500/10 hover:border-emerald-500/30 transition text-left group">
                        <h3 class="text-xs font-bold text-white uppercase tracking-widest mb-1">Marketing Mgr</h3><p class="text-[9px] text-zinc-500 font-bold">Campaigns & Events</p>
                    </button>
                    <button onclick="login('index.html', 'Manager')" class="p-4 rounded-xl border border-white/5 bg-black/40 hover:bg-zinc-500/10 hover:border-zinc-500/30 transition text-left group">
                        <h3 class="text-xs font-bold text-white uppercase tracking-widest mb-1">Office Controller</h3><p class="text-[9px] text-zinc-500 font-bold">Accounting & Payroll</p>
                    </button>
                </div>
            </div>

            <div>
                <div class="tier-header">
                    <span class="bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 text-[10px] font-black px-2 py-1 rounded">TIER 3</span>
                    <h2 class="text-xs font-bold text-zinc-400 uppercase tracking-widest">Operational Leads & Staff</h2>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="login('index.html', 'Staff')" class="p-4 rounded-xl border border-white/5 bg-black/40 hover:bg-emerald-500/10 hover:border-emerald-500/30 transition text-left flex items-center gap-4 group">
                        <div class="w-8 h-8 rounded-full bg-emerald-500/20 border border-emerald-500/30 text-emerald-400 flex items-center justify-center shrink-0"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg></div>
                        <div><h3 class="text-xs font-bold text-white uppercase tracking-widest">Lead Sales / Specialist</h3><p class="text-[9px] text-zinc-500 font-bold mt-0.5">Floor Traffic & Deal Desk</p></div>
                    </button>
                    <button onclick="login('service.html', 'Staff')" class="p-4 rounded-xl border border-white/5 bg-black/40 hover:bg-amber-500/10 hover:border-amber-500/30 transition text-left flex items-center gap-4 group">
                        <div class="w-8 h-8 rounded-full bg-amber-500/20 border border-amber-500/30 text-amber-400 flex items-center justify-center shrink-0"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z"></path></svg></div>
                        <div><h3 class="text-xs font-bold text-white uppercase tracking-widest">Lead Tech / Foreman</h3><p class="text-[9px] text-zinc-500 font-bold mt-0.5">Service Bays & Diagnostics</p></div>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script>
        function login(route, roleLevel) {
            // Saves specific role to validate exclusively on protected pages
            sessionStorage.setItem('apex_session', JSON.stringify({ dealer: 'Apex Dealer', color: '#34d399', role: roleLevel }));
            window.location.href = route;
        }
    </script>
</body>
</html>
