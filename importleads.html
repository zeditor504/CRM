<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Dealer Systems | Import Leads</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: { extend: { colors: { dark: '#09090b', panel: '#18181b', border: '#27272a', textm: '#a1a1aa' } } }
        }
    </script>
    
    <style>
        * { font-family: 'Inter Tight', sans-serif !important; box-sizing: border-box; }
        
        body { 
            background-color: #050505; 
            margin: 0; min-height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* 
         * MASSIVE GOLDEN GLOW ANIMATION 
         * Fixed position securely behind the UI
         */
        .golden-blob {
            position: fixed;
            top: 50%; left: 50%;
            width: 800px; height: 800px; 
            background: radial-gradient(circle, rgba(212, 175, 55, 0.2) 0%, transparent 65%);
            transform: translate(-50%, -50%);
            animation: breatheGold 6s ease-in-out infinite alternate;
            filter: blur(80px);
            z-index: 0;
            pointer-events: none;
        }

        @keyframes breatheGold {
            0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.7; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        }

        /* Frosted Glass Card */
        .import-card {
            background: rgba(9, 9, 11, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 10;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .crm-tab { transition: all 0.2s ease; }
        .crm-tab:hover {
            transform: translateY(-2px);
            background-color: #18181b;
            border-color: #52525b;
        }
    </style>
</head>
<body class="text-gray-200 relative">

    <div class="golden-blob"></div>

    <nav class="bg-panel border-b border-border h-16 flex items-center justify-between px-6 shrink-0 w-full relative z-20">
        <div class="flex items-center space-x-4">
            <a href="index.html" class="text-textm hover:text-white transition flex items-center text-sm font-semibold border-r border-border pr-4 mr-2 uppercase tracking-widest">
                <svg class="w-4 h-4 mr-1 inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Dashboard
            </a>
            <h1 class="text-lg font-bold text-white tracking-wide uppercase">Apex Dealer Systems</h1>
        </div>
    </nav>

    <main class="flex-1 flex items-center justify-center p-6 relative z-10 w-full">
        <div class="import-card rounded-2xl w-full max-w-2xl p-10 flex flex-col items-center">
            
            <div class="text-center mb-10">
                <h2 class="text-2xl font-black text-white uppercase mb-3 tracking-[0.4em]">IMPORT PAST LEADS</h2>
                <p class="text-sm text-textm">Select your previous software system to securely map data into Apex Dealer Systems.</p>
            </div>

            <div class="w-full space-y-3">
                <button onclick="simulateImport('Lightspeed DMS')" class="crm-tab w-full bg-dark border border-border rounded-lg px-6 py-4 flex items-center justify-between font-bold text-zinc-300 text-sm group">
                    <span>Import from Lightspeed DMS</span>
                    <span class="text-zinc-600 group-hover:text-[#00a4ef] transition uppercase tracking-widest font-black">Lightspeed</span>
                </button>

                <button onclick="simulateImport('DX1 Platform')" class="crm-tab w-full bg-dark border border-border rounded-lg px-6 py-4 flex items-center justify-between font-bold text-zinc-300 text-sm group">
                    <span>Import from DX1 Platform</span>
                    <span class="text-zinc-600 group-hover:text-[#e11d48] transition uppercase tracking-widest font-black">DX1</span>
                </button>

                <button onclick="simulateImport('DealerSpike CRM')" class="crm-tab w-full bg-dark border border-border rounded-lg px-6 py-4 flex items-center justify-between font-bold text-zinc-300 text-sm group">
                    <span>Import from DealerSpike CRM</span>
                    <span class="text-zinc-600 group-hover:text-[#f59e0b] transition uppercase tracking-widest font-black">DealerSpike</span>
                </button>

                <button onclick="simulateImport('Elead CRM')" class="crm-tab w-full bg-dark border border-border rounded-lg px-6 py-4 flex items-center justify-between font-bold text-zinc-300 text-sm group">
                    <span>Import from Elead CRM</span>
                    <span class="text-zinc-600 group-hover:text-[#3b82f6] transition uppercase tracking-widest font-black">Elead</span>
                </button>

                <button onclick="simulateImport('VinSolutions')" class="crm-tab w-full bg-dark border border-border rounded-lg px-6 py-4 flex items-center justify-between font-bold text-zinc-300 text-sm group">
                    <span>Import from VinSolutions</span>
                    <span class="text-zinc-600 group-hover:text-[#10b981] transition uppercase tracking-widest font-black">VinSolutions</span>
                </button>
            </div>
            
            <div id="status-feedback" class="mt-8 text-sm font-bold text-zinc-500 min-h-[20px] transition-all tracking-widest uppercase"></div>
        </div>
    </main>

    <footer class="w-full max-w-[1400px] mx-auto flex justify-between items-center text-[10px] text-textm font-semibold pb-4 px-6 shrink-0 relative z-20 uppercase tracking-widest">
        <div id="live-clock" class="text-left text-gray-500 flex-1">Time: --:--:--</div>
        <div class="text-center flex-1"><span style="color:#39FF14;">All Systems Online</span></div>
        <div class="text-right text-gray-500 flex-1">Central Time Zone (CT)</div>
    </footer>

    <script>
        function simulateImport(crmName) {
            const feedback = document.getElementById('status-feedback');
            feedback.className = "mt-8 text-sm font-bold text-yellow-500 tracking-widest uppercase animate-pulse flex items-center justify-center";
            feedback.innerHTML = `<svg class="w-4 h-4 mr-2 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg> Establishing data link with ${crmName}...`;
            
            setTimeout(() => {
                feedback.className = "mt-8 text-sm font-bold text-[#10b981] tracking-widest uppercase flex items-center justify-center";
                feedback.innerHTML = `<svg class="w-4 h-4 mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Data mapping complete. 0 records failed integrity verification.`;
            }, 1800);
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').innerText = `Time: ${now.toLocaleTimeString('en-US', { timeZone: 'America/Chicago', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true })}`;
        }
        setInterval(updateClock, 1000);
        updateClock(); 
    </script>
</body>
</html>
