<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Dealer Systems | Import Leads</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        * { font-family: 'Inter Tight', sans-serif !important; box-sizing: border-box; }
        
        /* STRICT DARK MODE ENFORCEMENT */
        body { 
            background-color: #141414 !important;
            color: #f1f5f9 !important;
            margin: 0; min-height: 100vh; overflow-x: hidden;
            display: flex; flex-direction: column; 
        }

        body::before {
            content: ''; position: fixed; inset: 0; z-index: -2; pointer-events: none;
            background-image: radial-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        .glow-wrapper { position: relative; width: 100%; max-width: 42rem; margin: 2rem auto; z-index: 10; flex: 1; display: flex; align-items: center;}
        
        .golden-glow {
            position: absolute; top: 50%; left: 50%; width: 100%; height: 100%; 
            background-image: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, transparent 65%);
            transform: translate(-50%, -50%); filter: blur(60px); z-index: -1; pointer-events: none;
            animation: pulseGlow 5s ease-in-out infinite alternate;
        }
        @keyframes pulseGlow { 0% { opacity: 0.6; transform: translate(-50%, -50%) scale(0.95); } 100% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); } }

        /* Neutral Dark Frosted Glass */
        .glass-panel {
            background-color: rgba(30, 30, 30, 0.4) !important;
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.04); border-top: 1px solid rgba(255, 255, 255, 0.08);  
            z-index: 10; box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.02), 0 30px 65px rgba(0, 0, 0, 0.8); border-radius: 24px;
        }

        .glass-nav {
            background-color: rgba(20, 20, 20, 0.8) !important; backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .crm-tab { 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            background-color: rgba(0, 0, 0, 0.3) !important; border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .crm-tab:hover { transform: translateY(-2px); background-color: rgba(255, 255, 255, 0.06) !important; }

        /* Vibrant Hover Glows */
        .tab-dp360:hover { border-color: #38bdf8; box-shadow: 0 4px 20px rgba(56, 189, 248, 0.2); }
        .tab-dx1:hover { border-color: #fb923c; box-shadow: 0 4px 20px rgba(251, 146, 60, 0.2); }
        .tab-elead:hover { border-color: #ef4444; box-shadow: 0 4px 20px rgba(239, 68, 68, 0.2); } 
        .tab-vinsolutions:hover { border-color: #60a5fa; box-shadow: 0 4px 20px rgba(96, 165, 250, 0.2); }

        .brand-logo { height: 28px; width: auto; object-fit: contain; }

        /* ISOLATED FOOTER LAYOUT */
        .footer-wrapper { width: 100%; max-width: 1400px; margin: 0 auto; padding: 20px 0; display: flex; align-items: center; border-top: 1px solid rgba(255, 255, 255, 0.05); margin-top: auto; }
        .footer-section { flex: 1; display: flex; }
        .footer-section.left { justify-content: flex-start; }
        .footer-section.center { justify-content: center; }
        .footer-section.right { justify-content: flex-end; }
        .footer-pill { background-color: rgba(20, 20, 20, 0.8) !important; border: 1px solid rgba(255, 255, 255, 0.04); border-radius: 100px; padding: 6px 16px; font-size: 12px !important; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; color: #a1a1aa; backdrop-filter: blur(8px); }

        .modal-overlay {
            position: fixed; inset: 0; background-color: rgba(0,0,0,0.85) !important; backdrop-filter: blur(12px);
            z-index: 50; display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .progress-box { width: 100%; max-width: 450px; padding: 40px; text-align: center; }
        .progress-bar-container { width: 100%; height: 6px; background-color: rgba(255,255,255,0.1) !important; border-radius: 100px; overflow: hidden; margin: 24px 0; }
        .progress-bar { height: 100%; background-color: #34d399 !important; width: 0%; transition: width 0.4s ease; }
    </style>
</head>
<body class="relative flex flex-col items-center">

    <nav class="glass-nav h-16 flex items-center justify-between px-6 shrink-0 w-full relative z-20">
        <div class="flex items-center space-x-4">
            <a href="index.html" class="text-zinc-400 hover:text-white transition flex items-center text-sm font-semibold border-r border-white/10 pr-4 mr-2 uppercase tracking-widest">
                Dashboard
            </a>
            <h1 class="text-lg font-bold text-white tracking-wide uppercase">Apex Dealer Systems</h1>
        </div>
    </nav>

    <main class="flex-1 flex items-center justify-center p-6 relative z-10 w-full">
        <div class="glow-wrapper w-full">
            <div class="golden-glow"></div>
            
            <div class="glass-panel w-full p-10 flex flex-col items-center relative z-10 mx-auto">
                <div class="text-center mb-10">
                    <h2 class="text-2xl font-bold text-white uppercase mb-3 tracking-[0.4em]">IMPORT PAST LEADS</h2>
                    <p class="text-sm text-zinc-400 font-medium">Select your previous software system to securely map data into Apex Dealer Systems.</p>
                </div>

                <div class="w-full space-y-3">
                    
                    <button onclick="startImport('Dealership Performance 360')" class="crm-tab tab-dp360 w-full rounded-xl px-6 py-4 flex items-center justify-between group">
                        <span class="font-medium text-slate-300 text-sm">Import from Dealership Performance 360</span>
                        <div class="flex items-center space-x-3 opacity-80 group-hover:opacity-100 transition">
                            <img src="assets/dp360.png" alt="DP360 Logo" class="brand-logo">
                            <span style="color: #16485c; font-weight: 900; font-size: 15px; letter-spacing: 0.5px;">DP360</span>
                        </div>
                    </button>

                    <button onclick="startImport('DX1 Platform')" class="crm-tab tab-dx1 w-full rounded-xl px-6 py-4 flex items-center justify-between group">
                        <span class="font-medium text-slate-300 text-sm">Import from DX1 Platform</span>
                        <div class="flex items-center space-x-3 opacity-80 group-hover:opacity-100 transition">
                            <img src="assets/dx1.png" alt="DX1 Logo" class="brand-logo">
                            <span style="color: #f5862a; font-weight: 900; font-size: 14px; letter-spacing: 0.5px;">DX1</span>
                        </div>
                    </button>

                    <button onclick="startImport('Elead CRM')" class="crm-tab tab-elead w-full rounded-xl px-6 py-4 flex items-center justify-between group">
                        <span class="font-medium text-slate-300 text-sm">Import from Elead CRM</span>
                        <div class="flex items-center space-x-3 opacity-80 group-hover:opacity-100 transition">
                            <img src="assets/elead.png" alt="Elead Logo" class="brand-logo">
                            <span style="color: #e03c32; font-weight: 900; font-size: 14px; letter-spacing: 0.5px;">ELEAD</span>
                        </div>
                    </button>

                    <button onclick="startImport('VinSolutions')" class="crm-tab tab-vinsolutions w-full rounded-xl px-6 py-4 flex items-center justify-between group">
                        <span class="font-medium text-slate-300 text-sm">Import from VinSolutions</span>
                        <div class="flex items-center space-x-3 opacity-80 group-hover:opacity-100 transition">
                            <img src="assets/vinsolutions.png" alt="VinSolutions Logo" class="brand-logo">
                            <span style="color: #1d3e74; font-weight: 900; font-size: 14px; letter-spacing: 0.5px;">VINSOLUTIONS</span>
                        </div>
                    </button>
                    
                </div>
            </div>
        </div>
    </main>

    <div id="progress-overlay" class="modal-overlay">
        <div class="glass-panel progress-box relative">
            <div class="w-12 h-12 rounded-full bg-blue-500/20 border border-blue-500/30 flex items-center justify-center mx-auto mb-6 shadow-[0_0_15px_rgba(59,130,246,0.3)]">
                <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            </div>
            <h3 class="text-xl font-bold text-white mb-2 tracking-wide" id="progress-title">Connecting to API</h3>
            <p class="text-sm text-slate-400 font-medium" id="progress-subtitle">Establishing secure handshake...</p>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress-fill"></div>
            </div>
            <button id="finish-btn" class="hidden w-full bg-slate-800 border border-white/10 text-white py-3 rounded-full text-xs uppercase tracking-widest font-bold mt-4 hover:bg-slate-700 transition" onclick="window.location.href='index.html'">Return to Dashboard</button>
        </div>
    </div>

    <footer class="footer-wrapper px-6">
        <div class="footer-section left">
            <div class="footer-pill font-mono" id="live-clock">Time: --:--:--</div>
        </div>
        <div class="footer-section center">
            <div class="footer-pill flex items-center gap-2 text-[#34d399] font-semibold">
                <div class="w-2 h-2 rounded-full bg-emerald-400 shadow-[0_0_8px_#34d399]"></div> All Systems Online
            </div>
        </div>
        <div class="footer-section right">
            <div class="footer-pill">Central Time Zone (CT)</div>
        </div>
    </footer>

    <script>
        function startImport(crmName) {
            document.getElementById('progress-overlay').classList.add('active');
            const title = document.getElementById('progress-title');
            const sub = document.getElementById('progress-subtitle');
            const fill = document.getElementById('progress-fill');
            const btn = document.getElementById('finish-btn');
            
            setTimeout(() => { fill.style.width = '30%'; title.innerText = `Mapping ${crmName}`; sub.innerText = "Aligning custom fields to Apex structure..."; }, 800);
            setTimeout(() => { fill.style.width = '70%'; title.innerText = "Syncing Records"; sub.innerText = "Transferring leads and customer histories..."; }, 2200);
            setTimeout(() => { 
                fill.style.width = '100%'; 
                title.innerText = "Import Complete"; 
                title.classList.add('text-[#34d399]');
                sub.innerText = "0 records failed integrity verification."; 
                btn.classList.remove('hidden');
            }, 3500);
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').innerText = `Time: ${now.toLocaleTimeString('en-US', { timeZone: 'America/Chicago', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true })}`;
        }
        setInterval(updateClock, 1000);
        updateClock(); 
    </script>
</body>
</html>
