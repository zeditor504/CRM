<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Dealer Systems | Import Leads</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        * { font-family: 'Inter Tight', sans-serif !important; box-sizing: border-box; }
        
        body { 
            background: linear-gradient(135deg, #050507 0%, #0b0f19 100%);
            margin: 0; min-height: 100vh; overflow-x: hidden;
            display: flex; flex-direction: column; color: #f1f5f9;
            background-image: radial-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        /* Confined Subtle Glow */
        .glow-wrapper { position: relative; width: 100%; max-width: 42rem; margin: 2rem auto; z-index: 10; }
        .golden-glow {
            position: absolute; top: 50%; left: 50%; width: 100%; height: 100%; 
            background: radial-gradient(circle, rgba(212, 175, 55, 0.2) 0%, transparent 65%);
            transform: translate(-50%, -50%); filter: blur(60px); z-index: -1; pointer-events: none;
            animation: pulseGlow 5s ease-in-out infinite alternate;
        }
        @keyframes pulseGlow { 0% { opacity: 0.6; transform: translate(-50%, -50%) scale(0.95); } 100% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); } }

        /* Frosted Glass Class */
        .glass-panel {
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.04); border-top: 1px solid rgba(255, 255, 255, 0.08);  
            z-index: 10; box-shadow: 0 20px 50px -10px rgba(0, 0, 0, 0.5); border-radius: 24px;
        }

        .glass-nav {
            background: rgba(10, 10, 12, 0.6); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .crm-tab { 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            background: rgba(0, 0, 0, 0.15); border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .crm-tab:hover { transform: translateY(-2px); background: rgba(255, 255, 255, 0.04); }

        .tab-dp360:hover { border-color: rgba(56, 189, 248, 0.4); box-shadow: 0 4px 20px rgba(56, 189, 248, 0.1); }
        .tab-lightspeed:hover { border-color: rgba(249, 115, 22, 0.4); box-shadow: 0 4px 20px rgba(249, 115, 22, 0.1); }
        .tab-dx1:hover { border-color: rgba(239, 68, 68, 0.4); box-shadow: 0 4px 20px rgba(239, 68, 68, 0.1); }
        .tab-dealerspike:hover { border-color: rgba(249, 115, 22, 0.4); box-shadow: 0 4px 20px rgba(249, 115, 22, 0.1); }
        .tab-elead:hover { border-color: rgba(239, 68, 68, 0.4); box-shadow: 0 4px 20px rgba(239, 68, 68, 0.1); } 
        .tab-vinsolutions:hover { border-color: rgba(59, 130, 246, 0.4); box-shadow: 0 4px 20px rgba(59, 130, 246, 0.1); }

        .footer-wrapper { width: 100%; max-width: 1400px; margin: 0 auto; padding: 20px 0; display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .footer-pill { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.04); border-radius: 100px; padding: 6px 16px; font-size: 12px !important; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; color: #a1a1aa; }

        /* Multi-step progress modal */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(11, 15, 25, 0.8); backdrop-filter: blur(10px);
            z-index: 50; display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .progress-box { width: 100%; max-width: 450px; padding: 40px; text-align: center; }
        .progress-bar-container { width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 100px; overflow: hidden; margin: 24px 0; }
        .progress-bar { height: 100%; background: #34d399; width: 0%; transition: width 0.4s ease; }
    </style>
</head>
<body class="relative flex flex-col items-center">

    <nav class="glass-nav h-16 flex items-center justify-between px-6 shrink-0 w-full relative z-20">
        <div class="flex items-center space-x-4">
            <a href="index.html" class="text-zinc-400 hover:text-white transition flex items-center text-sm font-semibold border-r border-white/10 pr-4 mr-2 uppercase tracking-widest">
                Dashboard
            </a>
            <h1 class="text-lg font-bold text-white tracking-wide uppercase">Apex Dealer Systems</h1>
        </div>
    </nav>

    <main class="flex-1 flex items-center justify-center p-6 relative z-10 w-full">
        <div class="glow-wrapper">
            <div class="golden-glow"></div>
            
            <div class="glass-panel w-full p-10 flex flex-col items-center relative z-10">
                <div class="text-center mb-10">
                    <h2 class="text-2xl font-bold text-white uppercase mb-3 tracking-[0.4em]">IMPORT PAST LEADS</h2>
                    <p class="text-sm text-zinc-400 font-medium">Select your previous software system to securely map data into Apex Dealer Systems.</p>
                </div>

                <div class="w-full space-y-3">
                    <button onclick="startImport('Dealership Performance 360')" class="crm-tab tab-dp360 w-full rounded-xl px-6 py-4 flex items-center justify-between font-medium text-slate-300 text-sm group">
                        <span>Import from Dealership Performance 360</span>
                        <div class="flex items-center space-x-2 opacity-80 group-hover:opacity-100 transition">
                            <svg width="105" height="24" viewBox="0 0 110 24" fill="none">
                                <path d="M 2 20 C 2 8 10 2 20 2 C 26 2 31 5 35 10" stroke="#38bdf8" stroke-width="4" stroke-dasharray="6 4" stroke-linecap="round"/>
                                <path d="M 12 18 L 19 10 L 21 19 Z" fill="#ffffff"/>
                                <circle cx="16" cy="18" r="3.5" fill="#ffffff"/>
                                <path d="M 4 18 L 16 18" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
                                <text x="42" y="18" fill="#38bdf8" font-family="'Inter Tight', sans-serif" font-weight="900" font-size="15" letter-spacing="0.5">DP360</text>
                            </svg>
                        </div>
                    </button>

                    <button onclick="startImport('Lightspeed DMS')" class="crm-tab tab-lightspeed w-full rounded-xl px-6 py-4 flex items-center justify-between font-medium text-slate-300 text-sm group">
                        <span>Import from Lightspeed DMS</span>
                        <div class="flex items-center space-x-2 opacity-80 group-hover:opacity-100 transition">
                            <svg width="135" height="24" viewBox="0 0 145 28" fill="none">
                                <g transform="skewX(-15) translate(8, 0)">
                                    <text x="0" y="19" fill="#f97316" font-family="Arial" font-weight="900" font-size="22" font-style="italic">LS</text>
                                    <rect x="-4" y="22" width="5" height="3" fill="#ffffff"/>
                                    <rect x="3" y="22" width="10" height="3" fill="#ffffff"/>
                                    <rect x="15" y="22" width="22" height="3" fill="#ffffff"/>
                                </g>
                                <text x="50" y="19" fill="#f97316" font-family="'Inter Tight', sans-serif" font-weight="900" font-size="13" letter-spacing="0.5">LIGHTSPEED</text>
                            </svg>
                        </div>
                    </button>

                    <button onclick="startImport('DX1 Platform')" class="crm-tab tab-dx1 w-full rounded-xl px-6 py-4 flex items-center justify-between font-medium text-slate-300 text-sm group">
                        <span>Import from DX1 Platform</span>
                        <div class="flex items-center space-x-2 opacity-80 group-hover:opacity-100 transition">
                            <svg width="75" height="24" viewBox="0 0 85 24" fill="none">
                                <g transform="translate(0, 1) scale(0.95)">
                                    <path d="M11,11 L3,6 L11,1 Z" fill="#84cc16" stroke="#ffffff" stroke-width="0.75" stroke-linejoin="round"/>
                                    <path d="M11,11 L11,1 L19,6 Z" fill="#f97316" stroke="#ffffff" stroke-width="0.75" stroke-linejoin="round"/>
                                    <path d="M11,11 L3,16 L3,6 Z" fill="#a855f7" stroke="#ffffff" stroke-width="0.75" stroke-linejoin="round"/>
                                    <path d="M11,11 L11,21 L3,16 Z" fill="#06b6d4" stroke="#ffffff" stroke-width="0.75" stroke-linejoin="round"/>
                                    <path d="M11,11 L19,6 L19,16 L11,21 Z" fill="#ef4444" stroke="#ffffff" stroke-width="0.75" stroke-linejoin="round"/>
                                </g>
                                <text x="26" y="18" fill="#ffffff" font-family="'Inter Tight', sans-serif" font-weight="900" font-size="16">DX1</text>
                            </svg>
                        </div>
                    </button>

                    <button onclick="startImport('DealerSpike CRM')" class="crm-tab tab-dealerspike w-full rounded-xl px-6 py-4 flex items-center justify-between font-medium text-slate-300 text-sm group">
                        <span>Import from DealerSpike CRM</span>
                        <div class="flex items-center space-x-2 opacity-80 group-hover:opacity-100 transition">
                            <svg width="140" height="26" viewBox="0 0 150 26" fill="none">
                                <g transform="translate(0, 1)">
                                    <path d="M 12 2 L 12 7.5 M 19.1 4.9 L 15.2 8.8 M 22 12 L 16.5 12 M 19.1 19.1 L 15.2 15.2 M 4.9 4.9 L 8.8 8.8" stroke="#f97316" stroke-width="3" stroke-linecap="square"/>
                                    <path d="M 2 12 L 12 12 L 12 22 M 4.9 19.1 L 12 12" stroke="#ffffff" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter"/>
                                </g>
                                <text x="32" y="18" fill="#f97316" font-family="'Inter Tight', sans-serif" font-weight="900" font-size="13" letter-spacing="0.2">DEALERSPIKE</text>
                            </svg>
                        </div>
                    </button>

                    <button onclick="startImport('Elead CRM')" class="crm-tab tab-elead w-full rounded-xl px-6 py-4 flex items-center justify-between font-medium text-slate-300 text-sm group">
                        <span>Import from Elead CRM</span>
                        <div class="flex items-center space-x-2 opacity-80 group-hover:opacity-100 transition">
                            <svg width="90" height="24" viewBox="0 0 90 24" fill="none">
                                <rect width="20" height="20" y="2" rx="4" fill="#ef4444"/>
                                <text x="10" y="18" fill="#ffffff" font-family="'Inter Tight', sans-serif" font-weight="600" font-size="18" text-anchor="middle">e</text>
                                <text x="28" y="18" fill="#ffffff" font-family="'Inter Tight', sans-serif" font-weight="800" font-size="14" letter-spacing="0.5">ELEAD</text>
                            </svg>
                        </div>
                    </button>

                    <button onclick="startImport('VinSolutions')" class="crm-tab tab-vinsolutions w-full rounded-xl px-6 py-4 flex items-center justify-between font-medium text-slate-300 text-sm group">
                        <span>Import from VinSolutions</span>
                        <div class="flex items-center space-x-2 opacity-80 group-hover:opacity-100 transition">
                            <svg width="150" height="24" viewBox="0 0 150 24" fill="none">
                                <circle cx="12" cy="12" r="10" fill="#1e40af"/>
                                <circle cx="12" cy="7.5" r="2.5" fill="#ffffff"/>
                                <path d="M 8.5 11.5 L 15.5 11.5 L 12 18 Z" fill="#ffffff" stroke="#ffffff" stroke-width="1" stroke-linejoin="round"/>
                                <text x="28" y="17" fill="#3b82f6" font-family="'Inter Tight', sans-serif" font-weight="800" font-size="14" letter-spacing="0.5">VINSOLUTIONS</text>
                            </svg>
                        </div>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div id="progress-overlay" class="modal-overlay">
        <div class="glass-panel progress-box relative">
            <div class="w-12 h-12 rounded-full bg-blue-500/20 border border-blue-500/30 flex items-center justify-center mx-auto mb-6">
                <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            </div>
            <h3 class="text-xl font-bold text-white mb-2 tracking-wide" id="progress-title">Connecting to API</h3>
            <p class="text-sm text-slate-400 font-medium" id="progress-subtitle">Establishing secure handshake...</p>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress-fill"></div>
            </div>
            <button id="finish-btn" class="hidden w-full bg-white text-black py-3 rounded-full text-xs uppercase tracking-widest font-bold mt-4 hover:bg-slate-200 transition" onclick="window.location.href='index.html'">Return to Dashboard</button>
        </div>
    </div>

    <footer class="footer-wrapper">
        <div class="footer-pill font-mono" id="live-clock">Time: --:--:--</div>
        <div class="footer-pill text-[#34d399] font-semibold">All Systems Online</div>
        <div class="footer-pill">Central Time Zone (CT)</div>
    </footer>

    <script>
        function startImport(crmName) {
            document.getElementById('progress-overlay').classList.add('active');
            const title = document.getElementById('progress-title');
            const sub = document.getElementById('progress-subtitle');
            const fill = document.getElementById('progress-fill');
            const btn = document.getElementById('finish-btn');
            
            setTimeout(() => { fill.style.width = '30%'; title.innerText = `Mapping ${crmName}`; sub.innerText = "Aligning custom fields to Apex structure..."; }, 800);
            setTimeout(() => { fill.style.width = '70%'; title.innerText = "Syncing Records"; sub.innerText = "Transferring leads and customer histories..."; }, 2200);
            setTimeout(() => { 
                fill.style.width = '100%'; 
                title.innerText = "Import Complete"; 
                title.classList.add('text-[#34d399]');
                sub.innerText = "0 records failed integrity verification."; 
                btn.classList.remove('hidden');
            }, 3500);
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').innerText = `Time: ${now.toLocaleTimeString('en-US', { timeZone: 'America/Chicago', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true })}`;
        }
        setInterval(updateClock, 1000);
        updateClock(); 
    </script>
</body>
</html>
