<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Dealer Systems | Import Leads</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        * { font-family: 'Inter Tight', sans-serif !important; box-sizing: border-box; }
        
        body { 
            background-color: #141414 !important;
            color: #f1f5f9 !important;
            margin: 0; min-height: 100vh; overflow-x: hidden; overflow-y: auto;
            display: flex; flex-direction: column; 
        }

        body::before {
            content: ''; position: fixed; inset: 0; z-index: -2; pointer-events: none;
            background-image: radial-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        #wave-layer { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            z-index: -1; pointer-events: none; overflow: hidden; 
        }
        
        .data-item { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; }
        .data-item-x { position: absolute; top: 0; left: -10vw; width: 0; height: 0; animation: moveX var(--duration) linear forwards; }
        .data-item-y { position: absolute; top: 0; left: 0; width: 0; height: 0; animation: moveY var(--duration) forwards; }
        
        .doc-icon, .check-icon { 
            position: absolute; top: 0; left: 0;
            display: flex; align-items: center; justify-content: center;
        }

        @keyframes moveX { 0% { transform: translateX(0); } 100% { transform: translateX(120vw); } }
        
        @keyframes moveY {
            0% { transform: translateY(var(--start-y)); animation-timing-function: cubic-bezier(0.4, 0, 0.6, 1); } 
            35% { transform: translateY(var(--mid-y)); animation-timing-function: linear; } 
            65% { transform: translateY(var(--mid-y)); animation-timing-function: cubic-bezier(0.4, 0, 0.6, 1); } 
            100% { transform: translateY(var(--end-y)); }
        }

        .doc-icon { animation: docFade var(--duration) linear forwards; }
        @keyframes docFade {
            0%, 35% { opacity: 0.85; transform: translate(-50%, -50%) rotate(var(--rot)) scale(1); }
            45%, 100% { opacity: 0; transform: translate(-50%, -50%) rotate(var(--rot)) scale(1); display: none; }
        }

        .check-icon { opacity: 0; animation: checkFade var(--duration) linear forwards; }
        @keyframes checkFade {
            0%, 45% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
            55%, 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .pop-particle { 
            position: absolute; width: 6px; height: 6px; background-color: #34d399; 
            border-radius: 50%; box-shadow: 0 0 10px #34d399; opacity: 0; pointer-events: none; 
            animation: particlePop 1s cubic-bezier(0.2, 1, 0.3, 1) forwards; 
        }
        @keyframes particlePop {
            0% { opacity: 1; transform: scale(1.5); }
            100% { opacity: 0; transform: translate(var(--px), var(--py)) scale(0); }
        }

        .glow-wrapper { position: relative; width: 100%; max-width: 42rem; margin: 2rem auto; z-index: 10; flex: 1; display: flex; align-items: center;}

        .glass-panel {
            background-color: rgba(30, 30, 30, 0.4) !important;
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.04); border-top: 1px solid rgba(255, 255, 255, 0.08);  
            z-index: 10; box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.02), 0 30px 65px rgba(0, 0, 0, 0.8); border-radius: 24px;
        }

        .glass-nav {
            background-color: rgba(20, 20, 20, 0.8) !important; backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* --- ADVANCED BORDER ANIMATION LOGIC --- */
        .crm-tab { 
            position: relative;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            background-color: rgba(255, 255, 255, 0.04) !important; /* Acts as the static border */
            border: none;
            border-radius: 0.75rem; /* 12px for rounded-xl */
            overflow: hidden;
            z-index: 1;
        }

        /* The Spinning Gradient */
        .crm-tab::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent 75%, var(--brand-glow) 100%);
            z-index: -2;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        /* The Inner Frosted Mask */
        .crm-tab::after {
            content: '';
            position: absolute;
            inset: 1px; /* Masks the center, leaving exactly 1px for the animated border */
            background-color: rgba(0, 0, 0, 0.4);
            border-radius: calc(0.75rem - 1px);
            z-index: -1;
            transition: background-color 0.2s ease;
        }

        /* Ensure Text/Content sits above the masks */
        .crm-tab > * {
            position: relative;
            z-index: 2;
        }

        .crm-tab:hover { transform: translateY(-2px); }
        .crm-tab:hover::after { background-color: rgba(20, 20, 20, 0.9); }
        
        .crm-tab:hover::before {
            opacity: 1;
            /* Chains the swift wrap (1.25s) into the idle loop (12.5s) seamlessly */
            animation: 
                border-spin-fast 1.25s linear forwards, 
                border-spin-idle 12.5s linear 1.25s infinite;
        }

        @keyframes border-spin-fast {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes border-spin-idle {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Brand Colors & External Glows */
        .tab-vinsolutions { --brand-glow: rgba(59, 130, 246, 1); box-shadow: 0 4px 20px rgba(59, 130, 246, 0.0); transition: box-shadow 0.2s; }
        .tab-vinsolutions:hover { box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3); }

        .tab-cdk { --brand-glow: rgba(156, 163, 175, 1); box-shadow: 0 4px 20px rgba(156, 163, 175, 0.0); transition: box-shadow 0.2s; }
        .tab-cdk:hover { box-shadow: 0 4px 20px rgba(156, 163, 175, 0.3); }

        .tab-dx1 { --brand-glow: rgba(249, 115, 22, 1); box-shadow: 0 4px 20px rgba(249, 115, 22, 0.0); transition: box-shadow 0.2s; }
        .tab-dx1:hover { box-shadow: 0 4px 20px rgba(249, 115, 22, 0.3); }

        .tab-dp360 { --brand-glow: rgba(56, 189, 248, 1); box-shadow: 0 4px 20px rgba(56, 189, 248, 0.0); transition: box-shadow 0.2s; }
        .tab-dp360:hover { box-shadow: 0 4px 20px rgba(56, 189, 248, 0.3); }

        .brand-text { font-weight: 900; font-size: 14px; letter-spacing: 0.5px; }
        .logo-box { width: 48px; height: 32px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .brand-logo { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* Dynamic Tooltip CSS */
        [data-tooltip] { cursor: help; }
        .dynamic-tooltip {
            position: absolute; background-color: rgba(20, 20, 20, 0.95); backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 12px 16px;
            color: #e4e4e7; font-size: 0.75rem; font-weight: 500; line-height: 1.5; text-transform: none; 
            letter-spacing: normal; width: 240px; text-align: left; z-index: 999999; pointer-events: none;
            opacity: 0; transition: opacity 0.2s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .dynamic-tooltip.active { opacity: 1; }

        .footer-wrapper { width: 100%; max-width: 1400px; margin: 0 auto; padding: 20px 0; display: flex; align-items: center; border-top: 1px solid rgba(255, 255, 255, 0.05); margin-top: auto; z-index: 20; position: relative;}
        .footer-section { flex: 1; display: flex; }
        .footer-section.left { justify-content: flex-start; }
        .footer-section.center { justify-content: center; }
        .footer-section.right { justify-content: flex-end; }
        .footer-pill { background-color: rgba(20, 20, 20, 0.8) !important; border: 1px solid rgba(255, 255, 255, 0.04); border-radius: 100px; padding: 6px 16px; font-size: 12px !important; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; color: #a1a1aa; backdrop-filter: blur(8px); }

        .modal-overlay {
            position: fixed; inset: 0; background-color: rgba(0,0,0,0.85) !important; backdrop-filter: blur(12px);
            z-index: 50; display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .progress-box { width: 100%; max-width: 450px; padding: 40px; text-align: center; }
        .progress-bar-container { width: 100%; height: 6px; background-color: rgba(255,255,255,0.1) !important; border-radius: 100px; overflow: hidden; margin: 24px 0; }
        .progress-bar { height: 100%; background-color: #34d399 !important; width: 0%; transition: width 0.4s ease; }
    </style>
</head>
<body class="relative flex flex-col items-center">

    <div id="wave-layer"></div>

    <nav class="glass-nav h-16 flex items-center justify-between px-6 shrink-0 w-full relative z-20">
        <div class="flex items-center space-x-4">
            <a href="index.html" class="text-zinc-400 hover:text-white transition flex items-center text-sm font-semibold border-r border-white/10 pr-4 mr-2 uppercase tracking-widest">
                <svg class="w-4 h-4 mr-2 inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Dashboard
            </a>
            <h1 class="text-lg font-bold text-white tracking-wide uppercase">Apex Dealer Systems</h1>
        </div>
    </nav>

    <main class="flex-1 flex items-center justify-center p-6 relative z-10 w-full">
        <div class="glow-wrapper w-full">
            
            <div class="glass-panel w-full p-10 flex flex-col items-center relative z-10 mx-auto">
                <div class="text-center mb-10">
                    <h2 class="text-2xl font-bold text-white uppercase mb-3 tracking-[0.3em] flex items-center justify-center gap-2 w-max mx-auto" data-tooltip="Importing maps old customer logs and vehicle data to the Apex ecosystem without overwriting active deals or creating duplicate entries.">IMPORT PAST LEADS <svg class="w-4 h-4 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></h2>
                    <p class="text-sm text-zinc-400 font-medium">Select your previous software system to securely map data into Apex Dealer Systems.</p>
                </div>

                <div class="w-full space-y-3">
                    
                    <button onclick="startImport('VinSolutions')" class="crm-tab tab-vinsolutions w-full px-6 py-4 flex items-center justify-between group">
                        <span class="font-medium text-slate-300 text-sm">Import from VinSolutions</span>
                        <div class="flex items-center space-x-3 opacity-80 group-hover:opacity-100 transition">
                            <div class="logo-box">
                                <img src="assets/vinsolutions.png" alt="VinSolutions Logo" class="brand-logo">
                            </div>
                            <span class="brand-text" style="color: #3b82f6; text-shadow: 0 0 10px rgba(59, 130, 246, 0.4);">VINSOL</span>
                        </div>
                    </button>

                    <button onclick="startImport('CDK Global')" class="crm-tab tab-cdk w-full px-6 py-4 flex items-center justify-between group">
                        <span class="font-medium text-slate-300 text-sm">Import from CDK Global</span>
                        <div class="flex items-center space-x-3 opacity-80 group-hover:opacity-100 transition">
                            <div class="logo-box">
                                <img src="assets/cdk.png" alt="CDK Logo" class="brand-logo">
                            </div>
                            <span class="brand-text" style="color: #9ca3af; text-shadow: 0 0 10px rgba(156, 163, 175, 0.4);">CDK</span>
                        </div>
                    </button>

                    <button onclick="startImport('DX1 Platform')" class="crm-tab tab-dx1 w-full px-6 py-4 flex items-center justify-between group">
                        <span class="font-medium text-slate-300 text-sm">Import from DX1 Platform</span>
                        <div class="flex items-center space-x-3 opacity-80 group-hover:opacity-100 transition">
                            <div class="logo-box">
                                <img src="assets/dx1.png" alt="DX1 Logo" class="brand-logo">
                            </div>
                            <span class="brand-text" style="color: #f97316; text-shadow: 0 0 10px rgba(249, 115, 22, 0.4);">DX1</span>
                        </div>
                    </button>

                    <button onclick="startImport('Dealership Performance 360')" class="crm-tab tab-dp360 w-full px-6 py-4 flex items-center justify-between group">
                        <span class="font-medium text-slate-300 text-sm">Import from Dealership Performance 360</span>
                        <div class="flex items-center space-x-3 opacity-80 group-hover:opacity-100 transition">
                            <div class="logo-box">
                                <img src="assets/dp360.png" alt="DP360 Logo" class="brand-logo">
                            </div>
                            <span class="brand-text" style="color: #38bdf8; text-shadow: 0 0 10px rgba(56, 189, 248, 0.4);">DP360</span>
                        </div>
                    </button>
                    
                </div>
            </div>
        </div>
    </main>

    <div id="progress-overlay" class="modal-overlay">
        <div class="glass-panel progress-box relative">
            <div class="w-12 h-12 rounded-full bg-blue-500/20 border border-blue-500/30 flex items-center justify-center mx-auto mb-6 shadow-[0_0_15px_rgba(59,130,246,0.3)]">
                <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            </div>
            <h3 class="text-xl font-bold text-white mb-2 tracking-wide" id="progress-title">Connecting to API</h3>
            <p class="text-sm text-slate-400 font-medium" id="progress-subtitle">Establishing secure handshake...</p>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress-fill"></div>
            </div>
            <button id="finish-btn" class="hidden w-full bg-slate-800 border border-white/10 text-white py-3 rounded-full text-xs uppercase tracking-widest font-bold mt-4 hover:bg-slate-700 transition" onclick="window.location.href='index.html'">Return to Dashboard</button>
        </div>
    </div>

    <footer class="footer-wrapper px-6">
        <div class="footer-section left">
            <div class="footer-pill font-mono" id="live-clock">Time: --:--:--</div>
        </div>
        <div class="footer-section center">
            <div class="footer-pill flex items-center gap-2 text-[#34d399] font-semibold">
                <div class="w-2 h-2 rounded-full bg-emerald-400 shadow-[0_0_8px_#34d399]"></div> All Systems Online
            </div>
        </div>
        <div class="footer-section right">
            <div class="footer-pill">Central Time Zone (CT)</div>
        </div>
    </footer>

    <script>
        function createDataWave() {
            const layer = document.getElementById('wave-layer');
            const item = document.createElement('div');
            item.className = 'data-item';
            
            const startY = Math.random() * 100;
            const endY = Math.random() * 100;
            const midY = 40 + Math.random() * 20;
            const rot = (Math.random() * 30 - 15).toFixed(2);
            const duration = 6 + Math.random() * 2;

            item.style.setProperty('--duration', `${duration}s`);
            item.style.setProperty('--start-y', `${startY}vh`);
            item.style.setProperty('--mid-y', `${midY}vh`);
            item.style.setProperty('--end-y', `${endY}vh`);
            item.style.setProperty('--rot', `${rot}deg`);

            let particlesHTML = '';
            const numParticles = 12 + Math.floor(Math.random() * 8); 
            for(let i=0; i<numParticles; i++) {
                const angle = Math.random() * Math.PI * 2;
                const dist = 30 + Math.random() * 50; 
                const px = (Math.cos(angle) * dist).toFixed(2) + 'px';
                const py = (Math.sin(angle) * dist).toFixed(2) + 'px';
                particlesHTML += `<div class="pop-particle" style="--px: ${px}; --py: ${py};"></div>`;
            }

            item.innerHTML = `
                <div class="data-item-x">
                    <div class="data-item-y">
                        <div class="doc-icon">
                            <div class="w-10 h-10 rounded-full border border-rose-500/40 bg-rose-500/10 flex items-center justify-center shadow-[0_0_15px_rgba(244,63,94,0.3)]">
                                <svg class="text-rose-500 w-5 h-5 drop-shadow-[0_0_5px_rgba(244,63,94,0.5)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                            </div>
                        </div>
                        <div class="check-icon">
                            <div class="w-10 h-10 rounded-full border border-emerald-400 bg-emerald-500/10 flex items-center justify-center shadow-[0_0_15px_rgba(52,211,153,0.3)]">
                                <svg class="text-emerald-400 w-6 h-6 drop-shadow-[0_0_5px_rgba(52,211,153,0.5)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
                            </div>
                            ${particlesHTML}
                        </div>
                    </div>
                </div>
            `;
            
            layer.appendChild(item);

            setTimeout(() => {
                const targetCheck = item.querySelector('.check-icon');
                if(!targetCheck) return;
                
                const numParticles = 12 + Math.floor(Math.random() * 8); 
                for(let i=0; i<numParticles; i++) {
                    const p = document.createElement('div');
                    p.className = 'pop-particle';
                    const angle = Math.random() * Math.PI * 2;
                    const dist = 30 + Math.random() * 50; 
                    const px = (Math.cos(angle) * dist).toFixed(2) + 'px';
                    const py = (Math.sin(angle) * dist).toFixed(2) + 'px';
                    p.style.setProperty('--px', px);
                    p.style.setProperty('--py', py);
                    p.style.animationDuration = `${duration}s`;
                    targetCheck.appendChild(p);
                }
            }, (duration * 1000) / 2);

            setTimeout(() => {
                if(item.parentNode) item.remove();
            }, (duration * 1000) + 100);
        }

        document.addEventListener("DOMContentLoaded", () => {
            setInterval(createDataWave, 480);
            for(let i=0; i<10; i++) { setTimeout(createDataWave, i * 150); }
        });

        function startImport(crmName) {
            document.getElementById('progress-overlay').classList.add('active');
            const title = document.getElementById('progress-title');
            const sub = document.getElementById('progress-subtitle');
            const fill = document.getElementById('progress-fill');
            const btn = document.getElementById('finish-btn');
            
            setTimeout(() => { fill.style.width = '30%'; title.innerText = `Mapping ${crmName}`; sub.innerText = "Aligning custom fields to Apex structure..."; }, 800);
            setTimeout(() => { fill.style.width = '70%'; title.innerText = "Syncing Records"; sub.innerText = "Transferring leads and customer histories..."; }, 2200);
            setTimeout(() => { 
                fill.style.width = '100%'; 
                title.innerText = "Import Complete"; 
                title.classList.add('text-[#34d399]');
                sub.innerText = "All records passed integrity verification!"; 
                btn.classList.remove('hidden');
            }, 3500);
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').innerText = `Time: ${now.toLocaleTimeString('en-US', { timeZone: 'America/Chicago', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true })}`;
        }
        setInterval(updateClock, 1000);
        updateClock(); 

        // Global Dynamic Tooltip Engine
        const tooltip = document.createElement('div');
        tooltip.className = 'dynamic-tooltip';
        document.body.appendChild(tooltip);

        document.querySelectorAll('[data-tooltip]').forEach(el => {
            el.addEventListener('mouseenter', () => {
                tooltip.innerHTML = el.getAttribute('data-tooltip');
                tooltip.classList.add('active');
            });
            el.addEventListener('mousemove', (e) => {
                let x = e.pageX + 15;
                let y = e.pageY + 15;
                
                const rect = tooltip.getBoundingClientRect();
                if (x + rect.width > window.innerWidth) x = window.innerWidth - rect.width - 15;
                if (y + rect.height > window.innerHeight + window.scrollY) y = e.pageY - rect.height - 15;
                
                tooltip.style.left = x + 'px';
                tooltip.style.top = y + 'px';
            });
            el.addEventListener('mouseleave', () => {
                tooltip.classList.remove('active');
            });
        });
    </script>
</body>
</html>
