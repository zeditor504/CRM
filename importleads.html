<!DOCTYPE html>
<html lang="en">
<head>
    <script src="apex-core.js"></script>
    <script src="speed-insights.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Dealer Systems | Lead Intake Forge</title>
    <script>
        if (!sessionStorage.getItem('apex_session')) {
            window.location.replace('login.html');
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        apex: {
                            bg: '#0A0A0A',
                            panel: '#1A1A1A',
                            primary: '#00FF9F',
                            cyan: '#00D8FF',
                            secondary: '#FF2E63',
                            premium: '#FFD700',
                            text: '#E0E0E0',
                            muted: '#666666'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        * { font-family: 'Inter Tight', sans-serif !important; box-sizing: border-box; }

        body {
            background-color: #0A0A0A !important;
            color: #f1f5f9 !important;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            background:
                radial-gradient(ellipse 80% 50% at 50% 40%, rgba(0, 255, 159, 0.04) 0%, transparent 70%),
                radial-gradient(ellipse 60% 40% at 50% 60%, rgba(0, 216, 255, 0.03) 0%, transparent 70%);
        }

        .glass-nav {
            background: linear-gradient(to bottom, rgba(20, 20, 20, 0.6) 0%, rgba(10, 10, 10, 0.7) 100%) !important;
            backdrop-filter: blur(40px) saturate(120%);
            -webkit-backdrop-filter: blur(40px) saturate(120%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 -1px 10px rgba(255, 255, 255, 0.02), 0 15px 40px rgba(0, 0, 0, 0.6);
        }

        /* Pulsing Core Brand Gradient border shell */
        .drop-zone-shell {
            position: relative;
            border-radius: 28px;
            padding: 2px;
            background: linear-gradient(135deg, #00FF9F, #00D8FF);
            animation: gradientPulse 3s ease-in-out infinite;
        }

        .drop-zone-shell::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 32px;
            background: linear-gradient(135deg, #00FF9F, #00D8FF);
            opacity: 0.25;
            filter: blur(18px);
            z-index: -1;
            animation: glowPulse 3s ease-in-out infinite;
        }

        @keyframes gradientPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.75; transform: scale(1.005); }
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.2; transform: scale(0.98); }
            50% { opacity: 0.45; transform: scale(1.02); }
        }

        .drop-zone {
            position: relative;
            border-radius: 26px;
            background: rgba(18, 18, 18, 0.72);
            backdrop-filter: blur(48px) saturate(140%);
            -webkit-backdrop-filter: blur(48px) saturate(140%);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.08),
                inset 0 0 40px rgba(0, 255, 159, 0.02),
                0 30px 80px rgba(0, 0, 0, 0.85);
            transition: background 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .drop-zone.is-dragover {
            background: rgba(0, 255, 159, 0.06);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.12),
                inset 0 0 60px rgba(0, 255, 159, 0.08),
                0 30px 80px rgba(0, 0, 0, 0.85);
        }

        .drop-zone.has-files {
            border-color: rgba(0, 255, 159, 0.2);
        }

        .format-badge {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            flex: 1 1 90px;
            min-width: 90px;
            max-width: 120px;
            padding: 18px 14px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: border-color 0.25s ease, background 0.25s ease;
        }

        .format-badge:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(0, 255, 159, 0.2);
        }

        .format-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(0, 255, 159, 0.12), rgba(0, 216, 255, 0.08));
            border: 1px solid rgba(0, 255, 159, 0.15);
        }

        .browse-btn {
            background: linear-gradient(135deg, #ffffff 0%, #d4d4d8 100%);
            color: #000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.15), inset 0 -2px 0 rgba(0, 0, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .browse-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.25), inset 0 -2px 0 rgba(0, 0, 0, 0.2);
        }

        .file-queue-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 0.75rem;
        }

        .file-queue-item .file-category {
            font-size: 0.6rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 3px 8px;
            border-radius: 6px;
            background: rgba(0, 255, 159, 0.12);
            color: #00FF9F;
            border: 1px solid rgba(0, 255, 159, 0.25);
            flex-shrink: 0;
        }

        .ocean-reveal {
            animation: oceanRise 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes oceanRise {
            0% { opacity: 0; transform: translateY(40px) scale(0.96); filter: blur(8px); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }
    </style>
</head>
<body class="flex flex-col">

    <nav class="glass-nav h-20 flex items-center justify-between px-8 w-full z-50 sticky top-0 shrink-0">
        <div class="flex items-center space-x-4">
            <a href="index.html" class="text-zinc-400 hover:text-white transition flex items-center text-sm font-medium border-r border-white/10 pr-4 mr-2 uppercase tracking-widest">
                <svg class="w-4 h-4 mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Sales Dash
            </a>
            <h1 class="text-lg font-black tracking-widest text-white uppercase">Apex OS</h1>
            <p class="text-[10px] text-zinc-400 font-bold uppercase tracking-widest mt-0.5 ml-3 pl-3 border-l border-white/10">Lead Intake Forge</p>
        </div>
        <div class="flex items-center space-x-6">
            <div class="h-6 w-px bg-white/10 mx-3 hidden sm:block"></div>
            <button onclick="sessionStorage.removeItem('apex_session'); window.location.replace('login.html');" class="text-zinc-500 hover:text-white transition font-bold text-xs uppercase tracking-widest cursor-pointer bg-transparent border-none">
                Log Out
            </button>
        </div>
    </nav>

    <main class="flex-1 flex items-center justify-center p-6 sm:p-10">
        <div id="forge-container" class="w-full max-w-xl ocean-reveal">

            <div class="drop-zone-shell">
                <div
                    id="drop-zone"
                    class="drop-zone p-10 sm:p-12 text-center"
                    role="button"
                    tabindex="0"
                    aria-label="Drag and drop lead files or click to browse"
                >
                    <input
                        type="file"
                        id="file-input"
                        class="sr-only"
                        multiple
                        accept=".csv,.pdf,.json,.xml,.txt,text/csv,application/pdf,application/json,text/xml"
                    >

                    <div class="w-16 h-16 mx-auto mb-6 rounded-2xl flex items-center justify-center bg-white/5 border border-white/10 relative">
                        <svg class="w-7 h-7 text-white/80" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                        </svg>
                    </div>

                    <h2 class="text-2xl sm:text-3xl font-black text-white uppercase tracking-tight mb-2">Drop Lead Files Here</h2>
                    <p class="text-sm text-zinc-400 font-medium mb-8 max-w-sm mx-auto leading-relaxed">
                        Drag datasets into the forge or browse your drive. Files are staged for the Node parser pipeline.
                    </p>

                    <div class="flex flex-wrap justify-center gap-3 mb-8" aria-label="Supported file formats">
                        <div class="format-badge">
                            <div class="format-icon">
                                <svg class="w-5 h-5 text-apex-primary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M3 14h18M10 3v18M3 6a3 3 0 013-3h12a3 3 0 013 3v12a3 3 0 01-3 3H6a3 3 0 01-3-3V6z"/>
                                </svg>
                            </div>
                            <span class="text-[10px] font-black text-white uppercase tracking-widest leading-tight">CSV<br>Datasets</span>
                        </div>
                        <div class="format-badge">
                            <div class="format-icon">
                                <svg class="w-5 h-5 text-apex-cyan" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M13 3v6h6"/>
                                </svg>
                            </div>
                            <span class="text-[10px] font-black text-white uppercase tracking-widest leading-tight">PDF<br>Deal Sheets</span>
                        </div>
                        <div class="format-badge">
                            <div class="format-icon">
                                <svg class="w-5 h-5 text-apex-primary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
                                    <rect x="9" y="3" width="6" height="4" rx="1"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6M9 16h4"/>
                                </svg>
                            </div>
                            <span class="text-[10px] font-black text-white uppercase tracking-widest leading-tight">Auction<br>Manifests</span>
                        </div>
                    </div>

                    <button type="button" id="browse-btn" class="browse-btn px-8 py-3.5 rounded-xl text-xs font-black uppercase tracking-widest">
                        Browse Files
                    </button>

                    <p id="drop-hint" class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mt-6">
                        .csv &middot; .pdf &middot; .json &middot; .xml &middot; .txt
                    </p>

                    <div id="file-queue" class="hidden mt-8 text-left space-y-2" aria-live="polite"></div>
                </div>
            </div>

        </div>
    </main>

    <script>
        /**
         * LeadIntakeForge — frontend intake layer.
         * Normalizes file payloads for future streaming to the Node backend parser.
         */
        const LeadIntakeForge = (() => {
            const CATEGORY_RULES = [
                { category: 'csv-dataset', extensions: ['.csv'], mimeTypes: ['text/csv', 'application/vnd.ms-excel'] },
                { category: 'pdf-deal-sheet', extensions: ['.pdf'], mimeTypes: ['application/pdf'] },
                { category: 'auction-manifest', extensions: ['.json', '.xml', '.txt'], mimeTypes: ['application/json', 'text/xml', 'text/plain'] }
            ];

            const dropZone = document.getElementById('drop-zone');
            const fileInput = document.getElementById('file-input');
            const browseBtn = document.getElementById('browse-btn');
            const fileQueue = document.getElementById('file-queue');
            const dropHint = document.getElementById('drop-hint');

            let dragDepth = 0;

            function getExtension(filename) {
                const dot = filename.lastIndexOf('.');
                return dot >= 0 ? filename.slice(dot).toLowerCase() : '';
            }

            function categorizeFile(file) {
                const ext = getExtension(file.name);
                const mime = (file.type || '').toLowerCase();

                for (const rule of CATEGORY_RULES) {
                    if (rule.extensions.includes(ext) || rule.mimeTypes.includes(mime)) {
                        return rule.category;
                    }
                }
                return 'unknown';
            }

            function formatBytes(bytes) {
                if (bytes < 1024) return bytes + ' B';
                if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
                return (bytes / 1048576).toFixed(1) + ' MB';
            }

            function buildPayload(fileList) {
                return Array.from(fileList).map((file) => ({
                    name: file.name,
                    size: file.size,
                    type: file.type || 'application/octet-stream',
                    lastModified: file.lastModified,
                    category: categorizeFile(file),
                    file
                }));
            }

            function renderQueue(payload) {
                if (!payload.length) {
                    fileQueue.classList.add('hidden');
                    fileQueue.innerHTML = '';
                    dropZone.classList.remove('has-files');
                    dropHint.classList.remove('hidden');
                    return;
                }

                dropZone.classList.add('has-files');
                dropHint.classList.add('hidden');
                fileQueue.classList.remove('hidden');
                fileQueue.innerHTML = payload.map((item) => `
                    <div class="file-queue-item">
                        <span class="file-category">${item.category.replace(/-/g, ' ')}</span>
                        <span class="text-white font-semibold truncate flex-1">${item.name}</span>
                        <span class="text-zinc-500 font-medium flex-shrink-0">${formatBytes(item.size)}</span>
                    </div>
                `).join('');
            }

            function dispatchPayload(payload) {
                console.group('[LeadIntakeForge] Intake payload ready for Node parser stream');
                console.log('fileCount:', payload.length);
                console.log('files:', payload.map(({ name, size, type, category, lastModified }) => ({
                    name, size, type, category, lastModified
                })));
                console.log('rawFileRefs:', payload.map((p) => p.file));
                console.groupEnd();

                // Future backend hook:
                // const formData = new FormData();
                // payload.forEach((item, i) => formData.append('files', item.file, item.name));
                // fetch('/api/import-leads', { method: 'POST', body: formData });

                window.dispatchEvent(new CustomEvent('lead-intake:files', { detail: { payload } }));
                return payload;
            }

            function handleFiles(fileList) {
                if (!fileList || !fileList.length) return [];
                const payload = buildPayload(fileList);
                renderQueue(payload);
                return dispatchPayload(payload);
            }

            function setDragOver(active) {
                dropZone.classList.toggle('is-dragover', active);
            }

            function bindEvents() {
                browseBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    fileInput.click();
                });

                dropZone.addEventListener('click', () => fileInput.click());

                dropZone.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        fileInput.click();
                    }
                });

                fileInput.addEventListener('change', (e) => {
                    handleFiles(e.target.files);
                    e.target.value = '';
                });

                ['dragenter', 'dragover'].forEach((evt) => {
                    dropZone.addEventListener(evt, (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        dragDepth++;
                        setDragOver(true);
                    });
                });

                ['dragleave', 'drop'].forEach((evt) => {
                    dropZone.addEventListener(evt, (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        if (evt === 'dragleave') {
                            dragDepth = Math.max(0, dragDepth - 1);
                            if (dragDepth === 0) setDragOver(false);
                        }
                        if (evt === 'drop') {
                            dragDepth = 0;
                            setDragOver(false);
                            handleFiles(e.dataTransfer.files);
                        }
                    });
                });

                document.addEventListener('dragover', (e) => e.preventDefault());
                document.addEventListener('drop', (e) => e.preventDefault());
            }

            return { init: bindEvents, handleFiles, buildPayload, categorizeFile };
        })();

        document.addEventListener('DOMContentLoaded', () => {
            LeadIntakeForge.init();
        });
    </script>
</body>
</html>
