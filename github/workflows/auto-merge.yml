\f0\fs24 \cf0 name: Continuous Integration Auto-Merge\
\
on:\
  pull_request:\
    types: [opened, synchronize]\
\
jobs:\
  instamerge:\
    runs-on: ubuntu-latest\
    if: contains(github.head_ref, 'cursor/') # Only auto-merges branches starting with cursor/\
    steps:\
      - name: Automatically Merge Cursor Branch\
        uses: pascalgn/automerge-action@v0.16.4\
        env:\
          GITHUB_TOKEN: "$\{\{ secrets.GITHUB_TOKEN \}\}"\
          MERGE_METHOD: "merge"\
          MERGE_FILTER_AUTHOR: "crmdev786" # Limits execution purely to your account}